<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bingo Dashboard – ravvis media.</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --dk:   #0e333b;
  --dp:   #074f5e;
  --gd:   #a89060;
  --gd2:  #c4aa7c;
  --sky:  #c2dde2;
  --white:#ffffff;
  --black:#060e10;
  --muted:#5a8a96;
  --card: #0a2830;
  --bdr:  #143843;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Urbanist", sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
body::before { content: ""; position: fixed; top: -10%; left: 50%; transform: translateX(-50%); width: 800px; height: 500px; background: radial-gradient(ellipse, rgba(7,79,94,0.2) 0%, transparent 70%); pointer-events: none; z-index: 0; }

/* LOGIN */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; z-index: 1; }
.login-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 20px; padding: 3rem 2.5rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5); animation: fadeUp 0.6s ease both; }
.login-card h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.4rem; }
.login-card h1 span { background: linear-gradient(90deg, var(--gd), var(--gd2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.login-card p { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }
.field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.9rem; text-align: left; }
.field label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.field input { background: var(--black); border: 1px solid var(--bdr); border-radius: 10px; padding: 0.82rem 1rem; color: var(--white); font-family: "Urbanist", sans-serif; font-size: 0.93rem; outline: none; transition: border 0.2s; }
.field input:focus { border-color: var(--dp); }
.field input::placeholder { color: #1e4a55; }
.btn-main { width: 100%; background: var(--dp); color: var(--white); border: none; border-radius: 10px; padding: 0.95rem; font-family: "Urbanist", sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s, transform 0.15s; }
.btn-main:hover { background: #0a6070; transform: translateY(-1px); }

/* DASHBOARD */
#dash-screen { display: none; position: relative; z-index: 1; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(6,14,16,0.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 100; }
.nav-brand { font-size: 1rem; font-weight: 900; letter-spacing: -0.03em; }
.nav-brand span { font-weight: 300; color: var(--muted); }
.nav-filter { display: flex; align-items: center; gap: 0.6rem; }
.nav-filter select { background: var(--card); border: 1px solid var(--bdr); border-radius: 8px; color: var(--white); font-family: "Urbanist", sans-serif; font-size: 0.83rem; padding: 0.4rem 0.8rem; outline: none; cursor: pointer; }
.btn-refresh { background: var(--dp); color: var(--white); border: none; border-radius: 8px; padding: 0.4rem 1rem; font-family: "Urbanist", sans-serif; font-size: 0.83rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-refresh:hover { background: #0a6070; }

.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* KPI CARDS */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
.kpi-card { background: var(--card); border: 1px solid var(--bdr); border-radius: 16px; padding: 1.4rem 1.5rem; animation: fadeUp 0.5s ease both; }
.kpi-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.kpi-value { font-size: 2.8rem; font-weight: 900; letter-spacing: -0.04em; color: var(--gd); line-height: 1; }
.kpi-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

/* SECTION */
.sec-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--bdr); }
.section { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease 0.1s both; }

/* TABLE */
.tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--bdr); }
table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
thead tr { background: var(--dk); }
thead th { padding: 0.75rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sky); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--bdr); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(7,79,94,0.1); }
tbody td { padding: 0.7rem 1rem; color: var(--white); }
.tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; }
.tag-reg  { background: rgba(7,79,94,0.3);  color: var(--sky); }
.tag-idea { background: rgba(168,144,96,0.2); color: var(--gd2); }
.tag-bingo{ background: rgba(100,200,100,0.2); color: #8ee; }
.tag-checkout { background: rgba(168,144,96,0.35); color: var(--gd); }
.tag-tpl  { background: rgba(14,51,59,0.5); color: var(--muted); }
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.88rem; }

/* IDEAS BAR CHART */
.ideas-list { display: flex; flex-direction: column; gap: 0.5rem; }
.idea-bar-row { display: grid; grid-template-columns: 24px 1fr 60px; align-items: center; gap: 0.75rem; }
.idea-bar-num { font-size: 0.65rem; font-weight: 800; color: var(--gd); text-align: right; }
.idea-bar-wrap { background: rgba(0,0,0,0.3); border-radius: 100px; height: 8px; overflow: hidden; }
.idea-bar-fill { height: 100%; background: linear-gradient(90deg, var(--dp), var(--gd)); border-radius: 100px; transition: width 0.8s ease; }
.idea-bar-label { font-size: 0.7rem; color: var(--muted); }
.idea-bar-count { font-size: 0.75rem; font-weight: 700; color: var(--gd); text-align: right; white-space: nowrap; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>ravvis <span>Dashboard</span></h1>
    <p>Content Bingo — your private data view</p>
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx"/>
    </div>
    <div class="field">
      <label>GitHub Repo</label>
      <input type="text" id="repo-input" placeholder="yourusername/content-bingo"/>
    </div>
    <button class="btn-main" onclick="loadDashboard()">View Dashboard &rarr;</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash-screen">
  <nav class="nav">
    <div class="nav-brand">ravvis <span>media.</span> &nbsp;·&nbsp; Bingo Dashboard</div>
    <div class="nav-filter">
      <select id="month-filter" onchange="renderAll()">
        <option value="all">All Months</option>
      </select>
      <button class="btn-refresh" onclick="loadDashboard()">Refresh</button>
    </div>
  </nav>
  <div class="container">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="section">
      <div class="sec-title">Most Completed Ideas</div>
      <div class="ideas-list" id="ideas-chart"></div>
    </div>
    <div class="section">
      <div class="sec-title">Registrations</div>
      <div class="tbl-wrap"><table id="reg-table"><thead><tr><th>Time</th><th>Nickname</th><th>Email</th><th>Month</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="section">
      <div class="sec-title">Bingo Wins</div>
      <div class="tbl-wrap"><table id="bingo-table"><thead><tr><th>Time</th><th>Nickname</th><th>Email</th><th>Month</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="section">
      <div class="sec-title">Full Board Checkouts</div>
      <div class="tbl-wrap"><table id="checkout-table"><thead><tr><th>Time</th><th>Nickname</th><th>Email</th><th>Ideas Done</th><th>Month</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="section">
      <div class="sec-title">All Events</div>
      <div class="tbl-wrap"><table id="all-table"><thead><tr><th>Time</th><th>Event</th><th>Nickname</th><th>Detail</th><th>Month</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</div>

<script>
var TOKEN = "";
var REPO  = "";
var allData = [];

function loadDashboard() {
  TOKEN = document.getElementById("token-input") ? document.getElementById("token-input").value.trim() : TOKEN;
  REPO  = document.getElementById("repo-input")  ? document.getElementById("repo-input").value.trim()  : REPO;
  if (!TOKEN || !REPO) { alert("Please enter your GitHub token and repo."); return; }

  fetch("https://api.github.com/repos/" + REPO + "/contents/data.json", {
    headers: { "Authorization": "token " + TOKEN, "Accept": "application/vnd.github.v3+json" }
  })
  .then(function(r) { return r.json(); })
  .then(function(fileData) {
    if (fileData.content) {
      allData = JSON.parse(atob(fileData.content.replace(/\n/g, "")));
    } else {
      allData = [];
    }
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dash-screen").style.display  = "block";
    populateMonthFilter();
    renderAll();
  })
  .catch(function(e) { alert("Could not load data. Check your token and repo name.\n" + e); });
}

function populateMonthFilter() {
  var months = {};
  allData.forEach(function(e) { if (e.month) months[e.month] = true; });
  var sel = document.getElementById("month-filter");
  sel.innerHTML = "<option value='all'>All Months</option>";
  Object.keys(months).sort().forEach(function(m) {
    var opt = document.createElement("option");
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

function filtered() {
  var month = document.getElementById("month-filter").value;
  if (month === "all") return allData;
  return allData.filter(function(e) { return e.month === month; });
}

function renderAll() {
  var data = filtered();
  renderKPIs(data);
  renderIdeasChart(data);
  renderTable("reg-table",      data.filter(function(e){ return e.event === "registration"; }),   function(e){ return "<td>" + fmt(e.timestamp) + "</td><td>" + esc(e.nickname) + "</td><td>" + esc(e.email) + "</td><td>" + (e.month||"") + "</td>"; });
  renderTable("bingo-table",    data.filter(function(e){ return e.event === "bingo"; }),           function(e){ return "<td>" + fmt(e.timestamp) + "</td><td>" + esc(e.nickname) + "</td><td>" + esc(e.email) + "</td><td>" + (e.month||"") + "</td>"; });
  renderTable("checkout-table", data.filter(function(e){ return e.event === "checkout"; }),        function(e){ return "<td>" + fmt(e.timestamp) + "</td><td>" + esc(e.nickname) + "</td><td>" + esc(e.email) + "</td><td>" + (e.ideas_completed||0) + "/20</td><td>" + (e.month||"") + "</td>"; });
  renderTable("all-table",      data.slice().reverse().slice(0,100),                               function(e){ return "<td>" + fmt(e.timestamp) + "</td><td><span class='tag tag-" + e.event.replace("_","-").replace("idea-completed","idea") + "'>" + e.event + "</span></td><td>" + esc(e.nickname||"") + "</td><td style='color:var(--muted);font-size:0.75rem'>" + detail(e) + "</td><td>" + (e.month||"") + "</td>"; });
}

function renderKPIs(data) {
  var regs      = data.filter(function(e){ return e.event === "registration"; }).length;
  var ideas     = data.filter(function(e){ return e.event === "idea_completed"; }).length;
  var bingos    = data.filter(function(e){ return e.event === "bingo"; }).length;
  var checkouts = data.filter(function(e){ return e.event === "checkout"; }).length;
  var kpis = [
    { label: "Registrations",  value: regs,      sub: "total players" },
    { label: "Ideas Stamped",  value: ideas,      sub: "total stamps" },
    { label: "BINGO Wins",     value: bingos,     sub: "lines completed" },
    { label: "Full Boards",    value: checkouts,  sub: "complete submissions" },
  ];
  var grid = document.getElementById("kpi-grid");
  grid.innerHTML = "";
  kpis.forEach(function(k) {
    var card = document.createElement("div");
    card.className = "kpi-card";
    card.innerHTML = "<div class='kpi-label'>" + k.label + "</div><div class='kpi-value'>" + k.value + "</div><div class='kpi-sub'>" + k.sub + "</div>";
    grid.appendChild(card);
  });
}

function renderIdeasChart(data) {
  var counts = {};
  data.filter(function(e){ return e.event === "idea_completed"; }).forEach(function(e){
    var key = e.idea_text || ("Idea #" + e.idea_num);
    counts[key] = (counts[key] || 0) + 1;
  });
  var entries = Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,20);
  var max = entries.length ? entries[0][1] : 1;
  var el = document.getElementById("ideas-chart");
  if (!entries.length) { el.innerHTML = "<div class='empty'>No idea completions yet.</div>"; return; }
  el.innerHTML = "";
  entries.forEach(function(pair, i) {
    var pct = Math.round(pair[1] / max * 100);
    var row = document.createElement("div");
    row.className = "idea-bar-row";
    row.innerHTML = "<div class='idea-bar-num'>" + String(i+1).padStart(2,"0") + "</div><div><div style='font-size:0.75rem;color:var(--white);margin-bottom:4px;'>" + esc(pair[0]) + "</div><div class='idea-bar-wrap'><div class='idea-bar-fill' style='width:" + pct + "%'></div></div></div><div class='idea-bar-count'>" + pair[1] + "x</div>";
    el.appendChild(row);
  });
}

function renderTable(id, rows, rowFn) {
  var tbody = document.querySelector("#" + id + " tbody");
  if (!rows.length) { tbody.innerHTML = "<tr><td colspan='10' class='empty'>No data yet.</td></tr>"; return; }
  tbody.innerHTML = rows.slice().reverse().map(function(e){ return "<tr>" + rowFn(e) + "</tr>"; }).join("");
}

function detail(e) {
  if (e.event === "idea_completed") return "#" + e.idea_num + " " + esc((e.idea_text||"").substring(0,40));
  if (e.event === "template_click") return esc(e.template || "");
  if (e.event === "checkout")       return (e.ideas_completed||0) + "/20 ideas";
  return "";
}

function fmt(ts) {
  if (!ts) return "";
  var d = new Date(ts);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
